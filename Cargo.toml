[package]
name = "evm-amm-state"
version = "0.1.0"
edition = "2024"
rust-version = "1.88"
license = "MIT OR Apache-2.0"
description = "EVM-backed AMM state loading, cache synchronization, and pool simulation models"
keywords = ["evm", "amm", "defi", "uniswap", "revm"]
categories = ["cryptography::cryptocurrencies", "simulation", "caching"]
readme = "README.md"
repository = "https://github.com/KaiCode2/evm-amm-state"
documentation = "https://docs.rs/evm-amm-state"

# Standalone workspace root: keeps this crate from being absorbed by any
# ancestor-directory workspace and gives it its own Cargo.lock.
[workspace]

[features]
default = ["toml"]
# Parse AMM definitions from an `amms.toml` file. When disabled, AMMs are
# defined programmatically via `AmmConfigEntry` and the `*_from_entries`
# loaders, and the crate does not depend on the `toml` crate.
toml = ["dep:toml"]

[dependencies]
# Companion crates. Consumed as git dependencies while the sibling repos are
# private and unpublished. At publish time (order: amm-math, evm-fork-cache,
# then this crate), drop `git`/`branch` and keep the crates.io `version`.
amm-math = { git = "ssh://git@github.com/KaiCode2/amm-math.git", branch = "main", version = "0.1" }
evm-fork-cache = { git = "ssh://git@github.com/KaiCode2/evm-fork-cache.git", branch = "main", version = "0.1" }

alloy-transport-balancer = { version = "0.1.2", default-features = false, features = ["balancer"] }

alloy-contract = "1.0.38"
alloy-eips = "1.0.38"
alloy-network = "1.0.38"
alloy-primitives = { version = "1.4", features = ["map"] }
alloy-provider = "1.0.38"
alloy-rpc-types-eth = "1.0.38"
alloy-sol-types = "1.4"

amms = "0.7.4"
anyhow = "1.0.98"
foundry-fork-db = "0.22"
futures = "0.3"
rayon = "1.10"
revm = { version = "34.0", features = ["std", "serde", "optional_eip3607", "optional_no_base_fee"] }
serde = { version = "1.0.228", features = ["derive"] }
toml = { version = "0.9.8", optional = true }
tracing = "0.1.41"
tokio = { version = "1.48.0", features = ["rt-multi-thread"] }

[dev-dependencies]
alloy-rpc-client = "1.0.38"
alloy-transport = "1.0.38"
# Examples subscribe to a live node over WebSockets; enable the pubsub transport.
alloy-provider = { version = "1.0.38", features = ["ws"] }
criterion = { version = "0.7", features = ["html_reports"] }
tokio = { version = "1.48.0", features = ["macros", "rt-multi-thread"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[[bench]]
name = "simulation"
harness = false

# Loads pools from examples/amms.toml; requires the optional `toml` feature.
[[example]]
name = "toml_loading"
required-features = ["toml"]
