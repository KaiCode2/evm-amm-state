[package]
name = "evm-amm-state"
version = "0.1.0"
edition = "2024"
rust-version = "1.88"
license = "MIT OR Apache-2.0"
description = "EVM-backed AMM state loading, cache synchronization, and pool simulation models"
keywords = ["evm", "amm", "defi", "uniswap", "revm"]
categories = ["cryptography::cryptocurrencies", "simulation", "caching"]
readme = "README.md"
repository = "https://github.com/KaiCode2/evm-amm-state"
documentation = "https://docs.rs/evm-amm-state"

# Standalone workspace root: keeps this crate from being absorbed by any
# ancestor-directory workspace and gives it its own Cargo.lock.
[workspace]

[features]
# Back-compat default: the full simulation + search pipeline and all protocols.
default = ["full-protocols", "simulation", "search", "toml"]

# --- Dependency tiers ---
# Protocol adapters, event decoding, and cache orchestration. Always compiled;
# this marker carries no heavy deps (no `amms` / `amm-math` / `rayon`).
adapters = []
# Pure-Rust pool math + cache-sync initialization (`LocalAMM`, `*_pool` modules).
simulation = ["dep:amms", "dep:amm-math"]
# Parallel multi-leg route/arbitrage search.
search = ["simulation", "dep:rayon"]
# Parse AMM definitions from an `amms.toml` file.
toml = ["dep:toml"]

# --- Per-protocol ADAPTER flags ---
# These gate the protocol *adapter* modules. Per-protocol gating of the
# simulation `LocalAMM` enum is deferred to the S2 `LocalAMM` rebuild.
uniswap-v2 = ["adapters"]
uniswap-v3 = ["adapters"]
pancake-v3 = ["uniswap-v3"] # served by the V3-family adapter
slipstream = ["uniswap-v3"] # served by the V3-family adapter
solidly-v2 = ["adapters"]
balancer-v2 = ["adapters"]
balancer-v3 = ["adapters"]
curve = ["adapters"]
erc4626 = ["adapters"]
uniswap-v4 = ["adapters"]

full-protocols = [
    "uniswap-v2",
    "uniswap-v3",
    "pancake-v3",
    "slipstream",
    "solidly-v2",
    "balancer-v2",
    "balancer-v3",
    "curve",
    "erc4626",
    "uniswap-v4",
]
common-protocols = ["uniswap-v2", "uniswap-v3", "balancer-v2", "curve"]

[dependencies]
# Companion crates. Consumed as git dependencies while the sibling repos are
# private and unpublished. At publish time (order: amm-math, evm-fork-cache,
# then this crate), drop `git`/`branch` and keep the crates.io `version`.
amm-math = { git = "ssh://git@github.com/KaiCode2/amm-math.git", branch = "main", version = "0.1", optional = true }
# INTERIM: pinned to the `cold-start-sync` branch tip (903af3d = base 27ae8762 +
# the additive cold-start module) while evm-fork-cache#12 is in review. Re-pin to
# the `main` merge commit before this consumer work merges to evm-amm-state main.
evm-fork-cache = { git = "ssh://git@github.com/KaiCode2/evm-fork-cache.git", rev = "903af3df887bf5718693d4bacf770552681e5273", version = "0.1" }

alloy-transport-balancer = { version = "0.1.2", default-features = false, features = ["balancer"] }

alloy-contract = "1.0.38"
alloy-eips = "1.0.38"
alloy-network = "1.0.38"
alloy-primitives = { version = "1.4", features = ["map"] }
alloy-provider = "1.0.38"
alloy-rpc-types-eth = "1.0.38"
alloy-sol-types = "1.4"

amms = { version = "0.7.4", optional = true }
anyhow = "1.0.98"
foundry-fork-db = "0.22"
futures = "0.3"
rayon = { version = "1.10", optional = true }
revm = { version = "34.0", features = ["std", "serde", "optional_eip3607", "optional_no_base_fee"] }
serde = { version = "1.0.228", features = ["derive"] }
toml = { version = "0.9.8", optional = true }
tracing = "0.1.41"
tokio = { version = "1.48.0", features = ["rt-multi-thread"] }

[dev-dependencies]
alloy-rpc-client = "1.0.38"
alloy-transport = "1.0.38"
# Examples subscribe to a live node over WebSockets; enable the pubsub transport.
alloy-provider = { version = "1.0.38", features = ["ws"] }
criterion = { version = "0.7", features = ["html_reports"] }
tokio = { version = "1.48.0", features = ["macros", "rt-multi-thread"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[[bench]]
name = "simulation"
harness = false
required-features = ["search"]

# Examples build on the simulation/search pipeline; gate them so an adapter-only
# `--no-default-features --all-targets` build skips rather than fails on them.
[[example]]
name = "triangular_arbitrage"
required-features = ["search"]

[[example]]
name = "programmatic_loading"
required-features = ["simulation"]

[[example]]
name = "event_subscription"
required-features = ["simulation"]

# Loads pools from examples/amms.toml; requires the optional `toml` feature.
[[example]]
name = "toml_loading"
required-features = ["toml", "simulation"]

# Adapter integration tests build against the per-protocol adapters; gate them
# so the adapter-only build runs them only when those adapters are enabled.
[[test]]
name = "adapter_a1"
required-features = ["uniswap-v2", "uniswap-v3", "balancer-v2"]

[[test]]
name = "adapter_reactive"
required-features = ["uniswap-v2", "uniswap-v3", "balancer-v2"]

[[test]]
name = "cold_start_adoption"
required-features = ["uniswap-v2", "uniswap-v3"]
