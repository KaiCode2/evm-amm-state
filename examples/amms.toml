# Example AMM definitions, grouped by chain name.
#
# TOML is an optional, convenient way to declare a working set of pools; it is
# not required by the crate. The same pools can be built in code with
# `AmmConfigEntry` (see examples/programmatic_loading.rs). Loading TOML needs
# the `toml` feature, which is enabled by default.
#
# Each `[[amms.<chain>]]` entry needs a `type` and `address`; the remaining
# fields are only consulted for the families that use them.

[[amms.ethereum]]
type = "uniswap_v3"
address = "0x88e6A0c2dDD26FEEb64F039a2c41296FcB3f5640" # USDC/WETH 0.05%
tokens = [
    "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48", # USDC
    "0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2", # WETH
]
fee_tier = 500

